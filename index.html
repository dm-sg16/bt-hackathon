<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BT Hackathon 2026 — Judge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --accent: #4f8ef7;
      --accent-dim: rgba(79,142,247,0.15);
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.15);
      --green-dim: rgba(34,197,94,0.15);
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #2d3748;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 32px;
    }

    .screen { display: none; width: 100%; max-width: 680px; flex-direction: column; gap: 14px; }
    .screen.active { display: flex; }

    .setup-header { text-align: center; padding: 8px 0 4px; }
    .setup-header h1 { font-size: 1.6rem; font-weight: 700; }
    .setup-header p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    .teams-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 12px;
      border: 1px solid var(--border);
      transition: border-color 0.15s;
    }
    .team-row:focus-within { border-color: var(--accent); }

    .team-num {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      min-width: 18px;
    }

    .team-row input {
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.95rem;
      width: 100%;
      outline: none;
    }
    .team-row input::placeholder { color: var(--muted); }

    .btn-start {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.3px;
      transition: filter 0.15s;
    }
    .btn-start:hover { filter: brightness(1.12); }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 16px;
    }

    .timer-block { flex: 0 0 auto; }

    .timer-digits {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .timer-digits.warn  { color: var(--warning); }
    .timer-digits.crit  { color: var(--danger); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    .timer-label { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

    .progress-wrap {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 1s linear, background 0.4s;
      border-radius: 3px;
    }

    .timer-controls { display: flex; gap: 6px; flex: 0 0 auto; }
    .ctrl-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: 5px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.12s;
    }
    .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

    .team-badge {
      text-align: center;
      padding: 2px 0;
    }
    .team-badge .name { font-size: 1.9rem; font-weight: 700; line-height: 1.15; }
    .team-badge .counter { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    .criterion {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 13px 14px;
      border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .criterion.scored { border-color: var(--border); }

    .crit-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .crit-name { font-weight: 600; font-size: 0.95rem; }
    .crit-range { font-size: 0.75rem; color: var(--muted); }

    .score-row { display: flex; gap: 7px; }

    .score-btn {
      flex: 1;
      padding: 10px 2px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
      user-select: none;
    }
    .score-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
    .score-btn.sel-pos  { border-color: var(--accent);  background: var(--accent);      color: #fff; }
    .score-btn.sel-zero { border-color: #475569;         background: #475569;            color: #fff; }
    .score-btn.sel-neg  { border-color: var(--danger);  background: var(--danger-dim);  color: var(--danger); font-weight: 700; }

    .notes-wrap textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 13px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }
    .notes-wrap textarea:focus { border-color: var(--accent); }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 13px 16px;
    }

    .score-summary .label { font-size: 0.75rem; color: var(--muted); }
    .score-summary .value { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }

    .nav-btns { display: flex; gap: 8px; align-items: center; }

    .warn-msg { font-size: 0.8rem; color: var(--warning); }

    .btn-back {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }

    .btn-next {
      background: var(--success);
      border: none;
      border-radius: var(--radius);
      color: white;
      padding: 11px 22px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.12s;
    }
    .btn-next:hover { filter: brightness(1.1); }

    .summary-header { text-align: center; }
    .summary-header h1 { font-size: 1.5rem; font-weight: 700; }
    .summary-header p  { color: var(--muted); font-size: 0.85rem; margin-top: 3px; }

    .tbl-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th {
      background: var(--surface2);
      padding: 9px 10px;
      text-align: center;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      border-bottom: 2px solid var(--border);
    }
    th:first-child { text-align: left; padding-left: 14px; }
    td { padding: 9px 10px; text-align: center; border-bottom: 1px solid var(--border); }
    td:first-child { text-align: left; padding-left: 14px; font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    tr.top-score td { background: var(--green-dim); }
    .total-cell { font-weight: 700; color: var(--accent); font-size: 1rem; }
    .notes-row td { padding: 2px 14px 8px; font-size: 0.78rem; color: var(--muted); text-align: left; }

    .summary-actions { display: flex; flex-direction: column; gap: 10px; }

    .btn-copy {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 13px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: filter 0.15s;
    }
    .btn-copy:hover { filter: brightness(1.1); }

    .btn-restart {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.12s;
    }
    .btn-restart:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 500px) {
      .teams-grid { grid-template-columns: 1fr; }
      .timer-digits { font-size: 1.8rem; }
      .team-badge .name { font-size: 1.4rem; }
      .score-btn { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div class="screen active" id="screen-setup">
  <div class="setup-header">
    <h1>BT Hackathon 2026</h1>
    <p>Enter team names in presentation order, then start judging.</p>
  </div>
  <div class="teams-grid" id="teams-grid"></div>
  <button class="btn-start" onclick="startJudging()">Start Judging →</button>
</div>

<div class="screen" id="screen-judging">
  <div class="top-bar">
    <div class="timer-block">
      <div class="timer-digits" id="timer-digits">6:00</div>
      <div class="timer-label">remaining</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
      <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="timer-controls">
        <button class="ctrl-btn" id="btn-pause" onclick="toggleTimer()">Pause</button>
        <button class="ctrl-btn" onclick="resetTimer()">Reset</button>
      </div>
    </div>
  </div>
  <div class="team-badge">
    <div class="name" id="team-name"></div>
    <div class="counter" id="team-counter"></div>
  </div>
  <div id="criteria-container"></div>
  <div class="notes-wrap">
    <textarea id="notes" rows="2" placeholder="Notes (optional)…" oninput="saveNotes()"></textarea>
  </div>
  <div class="bottom-bar">
    <div class="score-summary">
      <div class="label">Score</div>
      <div class="value" id="score-total">—</div>
    </div>
    <div class="nav-btns">
      <span class="warn-msg" id="warn-msg" style="display:none">Score all fields</span>
      <button class="ctrl-btn" id="btn-copy-progress" onclick="copyProgress()" title="Copy all scores so far">Copy</button>
      <button class="btn-back" id="btn-back" onclick="prevTeam()">← Back</button>
      <button class="btn-next" id="btn-next" onclick="nextTeam()">Next →</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-summary">
  <div class="summary-header">
    <h1>Results</h1>
    <p>BT Hackathon 2026 — Final Scores</p>
  </div>
  <div class="tbl-wrap"><div id="summary-table"></div></div>
  <div class="summary-actions">
    <button class="btn-copy" onclick="copyResults()">Copy Results to Clipboard</button>
    <button class="btn-restart" onclick="restart()">Start Over</button>
  </div>
</div>

<script>
const CRITERIA = [
  { id: 'execution',    label: 'Execution',          range: '0 – 4',    values: [0,1,2,3,4], displays: ['0','1','2','3','4'] },
  { id: 'difficulty',  label: 'Level of Difficulty', range: '0 – 4',    values: [0,1,2,3,4], displays: ['0','1','2','3','4'] },
  { id: 'ai',          label: 'AI Proficiency',      range: '0 to −2', values: [0,-1,-2],   displays: ['0','−1','−2'] },
  { id: 'ambition',    label: 'Ambition',             range: '0 to +2',  values: [0,1,2],     displays: ['0','+1','+2'] },
  { id: 'presentation',label: 'Presentation',         range: '0 to +1',  values: [0,1],       displays: ['0','+1'] },
];

const DURATION = 360;
const st = { teams: [], scores: [], idx: 0, timeLeft: DURATION, running: false, iv: null };

function initSetup() {
  const grid = document.getElementById('teams-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 8; i++) {
    const row = document.createElement('div');
    row.className = 'team-row';
    row.innerHTML = `<span class="team-num">${i}</span><input type="text" id="ti-${i}" placeholder="Team ${i}" autocomplete="off">`;
    grid.appendChild(row);
  }
}

function startJudging() {
  st.teams = [];
  for (let i = 1; i <= 8; i++) {
    const v = document.getElementById(`ti-${i}`).value.trim();
    st.teams.push(v || `Team ${i}`);
  }
  st.scores = st.teams.map(() => ({ execution: null, difficulty: null, ai: null, ambition: null, presentation: null, notes: '' }));
  st.idx = 0;
  show('screen-judging');
  renderJudging();
  resetTimer();
}

function renderJudging() {
  const { idx, teams, scores } = st;
  const s = scores[idx];
  document.getElementById('team-name').textContent    = teams[idx];
  document.getElementById('team-counter').textContent = `Team ${idx + 1} of ${teams.length}`;
  document.getElementById('btn-next').textContent     = idx === teams.length - 1 ? 'Finish ✓' : 'Next →';
  document.getElementById('btn-back').style.display   = idx === 0 ? 'none' : '';
  const container = document.getElementById('criteria-container');
  container.innerHTML = '';
  CRITERIA.forEach(c => {
    const card = document.createElement('div');
    card.className = `criterion${s[c.id] !== null ? ' scored' : ''}`;
    const btns = c.values.map((v, bi) => {
      let cls = 'score-btn';
      if (s[c.id] === v) cls += v > 0 ? ' sel-pos' : v < 0 ? ' sel-neg' : ' sel-zero';
      return `<button class="${cls}" onclick="setScore('${c.id}',${v})">${c.displays[bi]}</button>`;
    }).join('');
    card.innerHTML = `<div class="crit-header"><span class="crit-name">${c.label}</span><span class="crit-range">${c.range}</span></div><div class="score-row">${btns}</div>`;
    container.appendChild(card);
  });
  document.getElementById('notes').value = s.notes;
  refreshTotal();
}

function setScore(id, v) { st.scores[st.idx][id] = v; renderJudging(); }
function saveNotes() { st.scores[st.idx].notes = document.getElementById('notes').value; }

function refreshTotal() {
  const s = st.scores[st.idx];
  const vals = CRITERIA.map(c => s[c.id]);
  const incomplete = vals.some(v => v === null);
  const el = document.getElementById('score-total');
  if (incomplete) { el.textContent = '—'; el.style.color = ''; }
  else {
    const total = vals.reduce((a, b) => a + b, 0);
    el.textContent = total;
    el.style.color = total >= 8 ? 'var(--success)' : total < 4 ? 'var(--danger)' : 'var(--accent)';
  }
}

function nextTeam() {
  saveNotes();
  const s = st.scores[st.idx];
  if (CRITERIA.some(c => s[c.id] === null)) {
    const w = document.getElementById('warn-msg');
    w.style.display = 'inline';
    setTimeout(() => w.style.display = 'none', 2200);
    return;
  }
  stopTimer();
  if (st.idx === st.teams.length - 1) { showSummary(); }
  else { st.idx++; renderJudging(); resetTimer(); }
}

function prevTeam() {
  if (st.idx === 0) return;
  saveNotes(); stopTimer(); st.idx--; renderJudging(); resetTimer();
}

function startTimer() {
  clearInterval(st.iv); st.running = true;
  document.getElementById('btn-pause').textContent = 'Pause';
  st.iv = setInterval(() => { if (st.timeLeft > 0) { st.timeLeft--; tickDisplay(); } else { stopTimer(); } }, 1000);
}

function stopTimer() {
  clearInterval(st.iv); st.running = false;
  document.getElementById('btn-pause').textContent = 'Resume';
}

function toggleTimer() { st.running ? stopTimer() : startTimer(); }
function resetTimer() { stopTimer(); st.timeLeft = DURATION; tickDisplay(); startTimer(); }

function tickDisplay() {
  const m = Math.floor(st.timeLeft / 60);
  const s = st.timeLeft % 60;
  const el = document.getElementById('timer-digits');
  el.textContent = `${m}:${String(s).padStart(2, '0')}`;
  el.className = 'timer-digits' + (st.timeLeft <= 60 ? ' crit' : st.timeLeft <= 120 ? ' warn' : '');
  const pct = (st.timeLeft / DURATION) * 100;
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.style.background = st.timeLeft <= 60 ? 'var(--danger)' : st.timeLeft <= 120 ? 'var(--warning)' : 'var(--accent)';
}

function showSummary() {
  show('screen-summary');
  const { teams, scores } = st;
  const totals = scores.map(s => CRITERIA.reduce((sum, c) => sum + (s[c.id] ?? 0), 0));
  const maxTotal = Math.max(...totals);
  let html = `<table><thead><tr><th>Team</th><th>Exec</th><th>Diff</th><th>AI Prof</th><th>Ambition</th><th>Pres</th><th>Total</th></tr></thead><tbody>`;
  teams.forEach((name, i) => {
    const s = scores[i]; const total = totals[i];
    const fmt = (v, id) => { if (v === null) return '—'; if (id === 'ai' && v < 0) return v; if ((id === 'ambition' || id === 'presentation') && v > 0) return `+${v}`; return v; };
    html += `<tr${total === maxTotal ? ' class="top-score"' : ''}><td>${name}</td><td>${fmt(s.execution,'execution')}</td><td>${fmt(s.difficulty,'difficulty')}</td><td>${fmt(s.ai,'ai')}</td><td>${fmt(s.ambition,'ambition')}</td><td>${fmt(s.presentation,'presentation')}</td><td class="total-cell">${total}</td></tr>`;
    if (s.notes.trim()) html += `<tr class="notes-row"><td colspan="7">Notes: ${escHtml(s.notes.trim())}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('summary-table').innerHTML = html;
}

function buildResultsText() {
  const { teams, scores } = st;
  const fmt = (v, id) => {
    if (v === null) return '—';
    if (id === 'ai' && v < 0) return v;
    if ((id === 'ambition' || id === 'presentation') && v > 0) return `+${v}`;
    return v;
  };
  const header = ['Team','Execution','Difficulty','AI Prof','Ambition','Presentation','Total'];
  const rows = teams.map((name, i) => {
    const s = scores[i];
    const total = CRITERIA.every(c => s[c.id] !== null) ? CRITERIA.reduce((sum, c) => sum + s[c.id], 0) : '—';
    return [name, fmt(s.execution,'execution'), fmt(s.difficulty,'difficulty'), fmt(s.ai,'ai'), fmt(s.ambition,'ambition'), fmt(s.presentation,'presentation'), total].join('\t');
  });
  return [header.join('\t'), ...rows].join('\n');
}

function copyProgress() {
  saveNotes();
  navigator.clipboard.writeText(buildResultsText()).then(() => {
    const btn = document.getElementById('btn-copy-progress');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

function copyResults() {
  navigator.clipboard.writeText(buildResultsText()).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Results to Clipboard', 2000);
  });
}

function restart() {
  stopTimer();
  Object.assign(st, { teams: [], scores: [], idx: 0, timeLeft: DURATION, running: false, iv: null });
  show('screen-setup');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

initSetup();
</script>
</body>
</html>
